name: Publish Carousel 06 - ia-produtividade-salario
on:
  schedule:
    - cron: "08 10 26 3 *"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Publish carousel
        env:
          IG_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          IG_USER: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          set -e
          CAROUSEL_DIR="carousels/2026-03-18-carrossel-ia/carousel-06"
          echo "📸 Carousel 06 — ia-produtividade-salario"
          echo "🕐 Hora: 10:08 UTC"

          # Read caption
          CAPTION=$(cat "${CAROUSEL_DIR}/caption.txt")

          # Collect image URLs
          REPO="etergrowth-account/etergrowth-assets"
          BASE_URL="https://raw.githubusercontent.com/${REPO}/main"
          IMAGES=()
          for img in $(ls ${CAROUSEL_DIR}/slide-*.jpg | sort); do
            FILENAME=$(basename $img)
            IMAGES+=("${BASE_URL}/${CAROUSEL_DIR}/${FILENAME}")
          done
          echo "📁 ${#IMAGES[@]} slides"

          # Create image containers
          CONTAINER_IDS=()
          for URL in "${IMAGES[@]}"; do
            RESULT=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_USER}/media" \
              -d "image_url=${URL}" \
              -d "is_carousel_item=true" \
              -d "access_token=${IG_TOKEN}")
            ID=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            CONTAINER_IDS+=($ID)
            echo "  Container: $ID"
            sleep 2
          done

          sleep 5

          # Create carousel container
          CHILDREN=$(IFS=,; echo "${CONTAINER_IDS[*]}")
          CAROUSEL=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_USER}/media" \
            --data-urlencode "caption=${CAPTION}" \
            -d "media_type=CAROUSEL" \
            -d "children=${CHILDREN}" \
            -d "access_token=${IG_TOKEN}")
          CAROUSEL_ID=$(echo $CAROUSEL | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "🎠 Carousel container: ${CAROUSEL_ID}"

          sleep 5

          # Publish
          PUBLISH=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_USER}/media_publish" \
            -d "creation_id=${CAROUSEL_ID}" \
            -d "access_token=${IG_TOKEN}")
          POST_ID=$(echo $PUBLISH | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "✅ Publicado! ID: ${POST_ID}"

