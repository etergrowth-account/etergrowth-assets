name: Publish Carousel 03 - gpt5-supera-humanos

on:
  schedule:
    - cron: "0 18 23 3 *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish carousel to Instagram
        env:
          IG_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          IG_USER: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          set -e
          echo "🎠 A publicar carousel-03-gpt5-supera-humanos"
          
          # Image URLs
          URLS="https://raw.githubusercontent.com/etergrowth-account/etergrowth-assets/main/carousels/2026-03-18/carousel-03-gpt5-supera-humanos/slide-01.jpg https://raw.githubusercontent.com/etergrowth-account/etergrowth-assets/main/carousels/2026-03-18/carousel-03-gpt5-supera-humanos/slide-02.jpg https://raw.githubusercontent.com/etergrowth-account/etergrowth-assets/main/carousels/2026-03-18/carousel-03-gpt5-supera-humanos/slide-03.jpg https://raw.githubusercontent.com/etergrowth-account/etergrowth-assets/main/carousels/2026-03-18/carousel-03-gpt5-supera-humanos/slide-04.jpg https://raw.githubusercontent.com/etergrowth-account/etergrowth-assets/main/carousels/2026-03-18/carousel-03-gpt5-supera-humanos/slide-05.jpg https://raw.githubusercontent.com/etergrowth-account/etergrowth-assets/main/carousels/2026-03-18/carousel-03-gpt5-supera-humanos/slide-06.jpg https://raw.githubusercontent.com/etergrowth-account/etergrowth-assets/main/carousels/2026-03-18/carousel-03-gpt5-supera-humanos/slide-07.jpg"
          
          # Create image containers
          CONTAINER_IDS=""
          for URL in $URLS; do
            RESULT=$(curl -sf -X POST "https://graph.facebook.com/v21.0/$IG_USER/media" \
              --data-urlencode "image_url=$URL" \
              --data-urlencode "is_carousel_item=true" \
              --data-urlencode "access_token=$IG_TOKEN")
            CID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            echo "  Container: $CID"
            CONTAINER_IDS="$CONTAINER_IDS,$CID"
            sleep 1
          done
          CONTAINER_IDS="${CONTAINER_IDS#,}"  # remove leading comma
          
          sleep 5
          
          # Read caption
          CAPTION=$(cat "carousels/2026-03-18/carousel-03-gpt5-supera-humanos/caption.txt")
          
          # Create carousel container
          CAROUSEL=$(curl -sf -X POST "https://graph.facebook.com/v21.0/$IG_USER/media" \
            --data-urlencode "media_type=CAROUSEL" \
            --data-urlencode "children=$CONTAINER_IDS" \
            --data-urlencode "caption=$CAPTION" \
            --data-urlencode "access_token=$IG_TOKEN")
          CAROUSEL_ID=$(echo "$CAROUSEL" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "  Carousel container: $CAROUSEL_ID"
          
          sleep 5
          
          # Publish
          PUBLISH=$(curl -sf -X POST "https://graph.facebook.com/v21.0/$IG_USER/media_publish" \
            --data-urlencode "creation_id=$CAROUSEL_ID" \
            --data-urlencode "access_token=$IG_TOKEN")
          POST_ID=$(echo "$PUBLISH" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "✅ Post publicado! ID: $POST_ID"
          echo "🔗 https://www.instagram.com/p/$POST_ID/"
